kind = "slides"
previewPath = "/"
title = "Modern Cents — Prospect Deck"
version = "1.0.0"
id = "artifacts/moderncents-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21632

[services.development]
run = "pnpm --filter @workspace/moderncents-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moderncents-deck", "run", "build" ]
publicDir = "artifacts/moderncents-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21632"
BASE_PATH = "/"
